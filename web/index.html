<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>JP225 Monitor</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>JP225 Monitor</h1>
    <div class="status">
      <span id="leader-info" class="leader-info"></span>
      <span id="clock"></span>
      <span id="connection-status" class="badge offline">offline</span>
    </div>
  </header>

  <main class="main-grid">
    <!-- 左 1/3: 価格カード → チャート → AIチャット -->
    <div class="left-col">
      <section id="price-grid" class="price-grid"></section>

      <section class="chart-panel">
        <div id="tradingview-chart"></div>
      </section>

      <section class="chat-board">
        <div class="chat-header">
          <h2>AI チャット</h2>
          <button id="chat-clear" type="button" class="chat-clear">クリア</button>
        </div>
        <div id="chat-messages" class="chat-messages">
          <div class="chat-hint">市場や銘柄について質問してください</div>
        </div>
        <form id="chat-form" class="chat-form">
          <textarea id="chat-input" placeholder="質問を入力 (Enter送信)" rows="2"></textarea>
          <button type="submit" id="chat-send">送信</button>
        </form>
      </section>
    </div>

    <!-- 右 2/3: アラート → ニュース -->
    <div class="right-col">
      <section class="alerts-pane">
        <h2>Alerts</h2>
        <div id="alert-banner" class="alert-banner"></div>
      </section>

      <aside id="news-feed" class="news-feed">
        <h2>News</h2>
        <ul id="news-list"></ul>
      </aside>
    </div>
  </main>

  <button id="enable-sound" class="enable-sound">🔔 サウンドを有効化</button>

  <script type="module" src="./main.ts"></script>
</body>
</html>
