<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Finance Monitor</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Finance Monitor</h1>
    <div class="status">
      <span id="leader-info" class="leader-info"></span>
      <span id="clock"></span>
      <span id="connection-status" class="badge offline">offline</span>
    </div>
  </header>

  <main>
    <section id="alert-banner" class="alert-banner"></section>

    <div class="main-grid">
      <div class="left-stack">
        <section class="chart-panel">
          <div id="tradingview-chart"></div>
        </section>
        <section id="price-grid" class="price-grid"></section>
        <section class="chat-board">
          <div class="chat-header">
            <h2>AI チャット</h2>
            <button id="chat-clear" type="button" class="chat-clear">クリア</button>
          </div>
          <div id="chat-messages" class="chat-messages">
            <div class="chat-hint">市場の状況や銘柄について質問してください (例: 「日経が下げてる主な理由は？」「USD/JPYと日経の関係は？」)</div>
          </div>
          <form id="chat-form" class="chat-form">
            <textarea id="chat-input" placeholder="質問を入力 (Enter送信, Shift+Enter改行)" rows="2"></textarea>
            <button type="submit" id="chat-send">送信</button>
          </form>
        </section>
      </div>
      <aside id="news-feed" class="news-feed">
        <h2>News</h2>
        <ul id="news-list"></ul>
      </aside>
    </div>
  </main>

  <button id="enable-sound" class="enable-sound">🔔 サウンドを有効化</button>

  <script type="module" src="./main.ts"></script>
</body>
</html>
